<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Saarthi{% endblock %}</title>
  <style>
    :root {
      --ink:#1a2230; --muted:#697586; --line:#e3e8ef; --bg:#f6f8fb;
      --blue:#1f6feb; --card:#ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin:0; background:var(--bg); color:var(--ink);
      font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    }
    a { color:var(--blue); text-decoration:none; }
    a:hover { text-decoration:underline; }
    header {
      background:var(--card); border-bottom:1px solid var(--line);
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 28px;
    }
    header .brand { font-weight:700; font-size:18px; }
    header .brand span { color:var(--muted); font-weight:400; font-size:14px; }
    header nav a { margin-left:20px; font-weight:600; }
    main { max-width:1080px; margin:28px auto; padding:0 20px; }
    h1 { font-size:22px; margin:0 0 18px; }
    h2 { font-size:16px; margin:28px 0 12px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; }
    .card {
      background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px;
    }
    .card .num { font-size:26px; font-weight:700; }
    .card .lbl { color:var(--muted); font-size:13px; margin-top:2px; }
    table { width:100%; border-collapse:collapse; background:var(--card);
            border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    th, td { text-align:left; padding:11px 14px; border-bottom:1px solid var(--line); }
    th { font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    tr:last-child td { border-bottom:none; }
    .badge { display:inline-block; padding:2px 9px; border-radius:999px; font-size:12px; font-weight:600; }
    .s-new{background:#eef2f6;color:#475467}
    .s-contacted{background:#dbeafe;color:#1e40af}
    .s-engaged{background:#cffafe;color:#0e7490}
    .s-test_drive_requested{background:#e0e7ff;color:#3730a3}
    .s-feedback_given{background:#ede9fe;color:#5b21b6}
    .s-handed_off{background:#fef3c7;color:#92400e}
    .s-won{background:#dcfce7;color:#166534}
    .s-lost{background:#fee2e2;color:#991b1b}
    .s-opted_out{background:#e5e7eb;color:#374151}
    .s-unreachable{background:#f3f4f6;color:#6b7280}
    .bar { background:#eef2f6; border-radius:6px; height:10px; overflow:hidden; }
    .bar > span { display:block; height:100%; background:var(--blue); }
    .funnel-row { display:grid; grid-template-columns:160px 1fr 48px; gap:12px; align-items:center; margin:6px 0; }
    .chat { display:flex; flex-direction:column; gap:8px; }
    .bubble { max-width:75%; padding:9px 13px; border-radius:14px; }
    .bubble .meta { font-size:11px; color:var(--muted); margin-top:4px; }
    .in  { align-self:flex-start; background:#fff; border:1px solid var(--line); border-bottom-left-radius:4px; }
    .out { align-self:flex-end; background:#1f6feb; color:#fff; border-bottom-right-radius:4px; }
    .out .meta { color:#cfe0ff; }
    .panel { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; }
    .alert { background:#fffbeb; border:1px solid #fde68a; color:#92400e; border-radius:10px; padding:12px 14px; margin:12px 0; }
    .btn { display:inline-block; padding:7px 13px; border-radius:8px; border:1px solid var(--line);
           background:#fff; font-weight:600; cursor:pointer; font-size:14px; }
    .btn.primary { background:var(--blue); color:#fff; border-color:var(--blue); }
    .muted { color:var(--muted); }
    form.inline { display:inline; }
    .row-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Saarthi <span>· {{ dealership }}</span></div>
    <nav>
      <a href="/dashboard">Overview</a>
      <a href="/dashboard/handoff">Needs human</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
