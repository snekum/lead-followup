# Local dev stack. `docker compose up --build` runs with zero extra config
# (the mock WhatsApp provider is the default, so no credentials are needed).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saarthi
      POSTGRES_PASSWORD: saarthi
      POSTGRES_DB: saarthi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saarthi"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://saarthi:saarthi@db:5432/saarthi
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./:/app

  worker:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://saarthi:saarthi@db:5432/saarthi
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app.celery_app worker -B --loglevel=info
    volumes:
      - ./:/app

volumes:
  pgdata:
